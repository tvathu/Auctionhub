{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Create Auction{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Create Auction for "{{ product.title }}"</h2>
        <p class="text-muted">Choose timed (auto-closes) or open (you close manually).</p>
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button class="btn btn-dark mt-2">Start Auction</button>
        </form>
    </div>
</div>
{% endblock %}
